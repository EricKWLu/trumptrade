server {
    listen 80;
    server_name _;

    # Backend API routes — proxy to FastAPI on :8000
    # Matches all FastAPI route prefixes (no /api/ prefix in this app)
    location ~ ^/(posts|trades|portfolio|alerts|watchlist|settings|trading|benchmarks|health) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket — live post feed
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # React SPA — serve static files, fallback to index.html for client-side routing
    location / {
        root /home/trumptrade/trumptrade/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
